apiVersion: apps/v1
kind: Deployment
metadata:
  name: item
spec:
  replicas: 1
  selector:
    matchLabels:
      app: item
  template:    
    metadata:
      labels:
        app: item
    spec:
      containers:
      - name: item
        image: registry.cn-hangzhou.aliyuncs.com/kube/item:2026-05-10-d69c7c0
        imagePullPolicy: Always
        resources:
          requests:
            cpu: "100m"     
            memory: "16Mi"  
          limits:
            cpu: "500m"     
            memory: "512Mi" 
        ports:
        - containerPort: 50051
        env: 
        - name: TOKEN
          value: "vUZvdEy9+"
        - name: HOST_IP
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
      imagePullSecrets:
      - name: aliyun-registry-secret
---
# 自动创建的 Service
apiVersion: v1
kind: Service
metadata:
  name: item
spec:
  selector:
    app: item
  ports:
  - port: 50055
    targetPort: 50055
  type: ClusterIP