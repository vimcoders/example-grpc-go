      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  nats-3:
    image: nats:latest
    container_name: nats-3
    command:
      - "--name"
      - "nats-3"
      - "--cluster_name"
      - "nats-cluster"
      - "--cluster"
      - "nats://0.0.0.0:6222"
      - "--cluster_advertise"
      - "nats-3:6222"
      - "--routes"
      - "nats://nats-1:6222,nats://nats-2:6222,nats://nats-3:6222"
      - "--http_port"
      - "8222"
      - "--port"
      - "4222"
    networks:
      - example
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nats-server", "--check"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s    
  redis-1:
    image: redis:latest
    container_name: redis-1  # 自定义容器名称
    networks:
      - example
    command: >
      redis-server
        --cluster-enabled yes
        --cluster-config-file nodes.conf
        --cluster-node-timeout 5000
        --appendonly no
    healthcheck:
      # 修复2：健康检查改对（端口6379，用redis-cli更可靠）
      test: ["CMD", "redis-cli", "PING"]  # 不用nc，直接用Redis自带命令
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s 
