        condition: service_healthy  # 等待 redis 健康后再启动
      redis-3:
        condition: service_healthy  # 等待 redis 健康后再启动
      redis-4:
        condition: service_healthy  # 等待 redis 健康后再启动
      redis-5:
        condition: service_healthy  # 等待 redis 健康后再启动
      redis-6:
        condition: service_healthy  # 等待 redis 健康后再启动
      mysql:
        condition: service_healthy  # 等待 mysql 健康后再启动
      nats:
        condition: service_healthy  # 等待 nats 健康后再启动
  mysql:
    image: mysql:latest
    restart: always
    networks:
      - kube  # 加入私有网络
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: 'root'
    ports:
      - "3306:3306"
    # 健康检查配置：判断 MySQL 是否可连接
    healthcheck:
      # 测试命令：使用 mysqladmin  ping 检查连接
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s        # 每5秒检查一次
      timeout: 5s         # 单次检查超时时间
      retries: 10         # 最多重试10次（总计约50秒）
      start_period: 15s   # 启动后15秒内不检查（预留初始化时间）
  nats:
    image: nats:latest
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "nats-server", "--check"]
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 5s
    restart: always
    networks:
      - kube
  redis-1:
    image: redis:latest
    container_name: redis-1  # 自定义容器名称
    networks:
      - kube
    command: >
      redis-server
        --cluster-enabled yes
        --cluster-config-file nodes.conf
        --cluster-node-timeout 5000
        --appendonly no
    healthcheck:
      # 修复2：健康检查改对（端口6379，用redis-cli更可靠）
      test: ["CMD", "redis-cli", "PING"]  # 不用nc，直接用Redis自带命令
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s 
