      redis-1: { condition: service_healthy }
      redis-2: { condition: service_healthy }
      redis-3: { condition: service_healthy }
      redis-4: { condition: service_healthy }
      redis-5: { condition: service_healthy }
      redis-6: { condition: service_healthy }
      mysql: { condition: service_healthy }  # 等待 mysql 健康后再启动
      nats-1: { condition: service_healthy } # 等待 nats 健康后再启动
      nats-2: { condition: service_healthy } # 等待 nats 健康后再启动
      nats-3: { condition: service_healthy } # 等待 nats 健康后再启动
  mysql:
    image: mysql:latest
    container_name: mysql
    restart: always
    networks:
      - example  # 加入私有网络
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: 'root'
    # 健康检查配置：判断 MySQL 是否可连接
    healthcheck:
      # 测试命令：使用 mysqladmin  ping 检查连接
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s        # 每5秒检查一次
      timeout: 5s         # 单次检查超时时间
      retries: 10         # 最多重试10次（总计约50秒）
      start_period: 15s   # 启动后15秒内不检查（预留初始化时间）
  nats-1:
    image: nats:latest
    container_name: nats-1
    command:
      - "--name"
      - "nats-1"
      - "--cluster_name"
      - "nats-cluster"
      - "--cluster"
      - "nats://0.0.0.0:6222"
      - "--cluster_advertise"
      - "nats-1:6222"
      - "--routes"
      - "nats://nats-1:6222,nats://nats-2:6222,nats://nats-3:6222"
      - "--http_port"
      - "8222"
      - "--port"
      - "4222"
    networks:
      - example
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nats-server", "--check"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  nats-2:
    image: nats:latest
    container_name: nats-2
    command:
      - "--name"
      - "nats-2"
      - "--cluster_name"
      - "nats-cluster"
      - "--cluster"
      - "nats://0.0.0.0:6222"
      - "--cluster_advertise"
      - "nats-2:6222"
      - "--routes"
      - "nats://nats-1:6222,nats://nats-2:6222,nats://nats-3:6222"
      - "--http_port"
      - "8222"
      - "--port"
      - "4222"
    networks:
