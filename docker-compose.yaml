    build:
      dockerfile: cmd/balance/Dockerfile
    image: ${REGISTRY_URL}/balance:${IMAGE_ID}
    container_name: balance  # 自定义容器名称
    restart: always
    networks:
      - kube  # 加入私有网络
    environment:
      MYSQL: ${MYSQL_DSN}
    depends_on:
      redis-1:
        condition: service_healthy  # 等待 redis 健康后再启动
      redis-2:
