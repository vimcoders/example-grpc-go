      retries: 10
      start_period: 15s 
  redis-cluster-init:
    image: redis:latest
    container_name: redis-cluster-init
    networks:
      - example
    depends_on:
      redis-1: { condition: service_healthy }
      redis-2: { condition: service_healthy }
      redis-3: { condition: service_healthy }
      redis-4: { condition: service_healthy }
      redis-5: { condition: service_healthy }
      redis-6: { condition: service_healthy }
    entrypoint:
      - sh
      - -c
      - |
        redis-cli --cluster create redis-1:6379 redis-2:6379 redis-3:6379 redis-4:6379 redis-5:6379 redis-6:6379 --cluster-replicas 1 --cluster-yes
    restart: "no"
networks:
  example:
    driver: bridge  # 使用桥接驱动，默认选项